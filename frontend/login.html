<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar sesión — TasteFlow</title>
  <link rel="icon" href="assets/icons/favicon.ico">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/components/forms.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <a href="/" class="navbar-logo">
        <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
          <rect width="36" height="36" rx="10" fill="#00897B"/>
          <path d="M18 8C14 8 11 11 11 15C11 19 15 24 18 28C21 24 25 19 25 15C25 11 22 8 18 8Z" fill="#80CBC4"/>
          <path d="M18 12C16 12 14.5 13.5 14.5 15.5C14.5 17 16 19.5 18 22C20 19.5 21.5 17 21.5 15.5C21.5 13.5 20 12 18 12Z" fill="#4DB6AC"/>
        </svg>
        TasteFlow
      </a>
      <h1>Bienvenido de vuelta</h1>
      <p class="auth-subtitle">Ingresa a tu cuenta para continuar</p>

      <div class="form-alert" id="formAlert" role="alert"></div>

      <form id="loginForm" novalidate>
        <div class="form-group">
          <label class="form-label" for="email">Correo electrónico</label>
          <input class="form-input" type="email" id="email" placeholder="tu@correo.com" required autocomplete="email">
          <div class="form-error" id="emailError">Ingresa un correo válido</div>
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Contraseña</label>
          <div class="password-wrapper">
            <input class="form-input" type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
            <button type="button" class="password-toggle" id="passwordToggle" aria-label="Mostrar contraseña">👁️</button>
          </div>
          <div class="form-error" id="passwordError">La contraseña debe tener al menos 6 caracteres</div>
        </div>
        <div class="form-group">
          <label class="form-checkbox">
            <input type="checkbox" checked>
            Recordar sesión
          </label>
        </div>
        <button type="submit" class="btn btn-primary btn-block btn-lg" id="submitBtn">Iniciar sesión</button>
      </form>

      <div class="form-footer">
        ¿No tienes cuenta? <a href="register.html">Regístrate gratis</a>
      </div>
    </div>
  </div>

  <script type="module" src="js/pages/auth.js"></script>
</body>
</html>
