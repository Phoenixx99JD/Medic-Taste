<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crear cuenta — TasteFlow</title>
  <link rel="icon" href="assets/icons/favicon.ico">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/components/forms.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <a href="/" class="navbar-logo">
        <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
          <rect width="36" height="36" rx="10" fill="#00897B"/>
          <path d="M18 27.5C23 27.5 27 23.5 27 18C27 13 23 11 18 12C13 11 9 13 9 18C9 23.5 13 27.5 18 27.5Z" fill="#80CBC4"/>
          <path d="M16 11.5L18 8.5L20 11.5Z" fill="#00897B"/>
          <path d="M18 10V7" stroke="#4DB6AC" stroke-width="2" stroke-linecap="round"/>
          <path d="M18 8.5C21 6.5 24 7.5 23.5 10C23 12 20 11 18 8.5Z" fill="#4DB6AC"/>
        </svg>
        TasteFlow
      </a>
      <h1>Crear tu cuenta</h1>
      <p class="auth-subtitle">Empieza a planificar tu alimentación saludable</p>

      <div class="form-alert" id="formAlert" role="alert"></div>

      <form id="registerForm" novalidate>
        <div class="form-group">
          <label class="form-label" for="name">Nombre completo</label>
          <input class="form-input" type="text" id="name" placeholder="Tu nombre" required autocomplete="name">
          <div class="form-error" id="nameError">Ingresa tu nombre</div>
        </div>
        <div class="form-group">
          <label class="form-label" for="email">Correo electrónico</label>
          <input class="form-input" type="email" id="email" placeholder="tu@correo.com" required autocomplete="email">
          <div class="form-error" id="emailError">Ingresa un correo válido</div>
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Contraseña</label>
          <div class="password-wrapper">
            <input class="form-input" type="password" id="password" placeholder="Mínimo 6 caracteres" required autocomplete="new-password">
            <button type="button" class="password-toggle" id="passwordToggle" aria-label="Mostrar contraseña">👁️</button>
          </div>
          <div class="form-error" id="passwordError">La contraseña debe tener al menos 6 caracteres</div>
        </div>
        <div class="form-group">
          <label class="form-checkbox">
            <input type="checkbox" required>
            Acepto los <a href="#" target="_blank">Términos y condiciones</a>
          </label>
        </div>
        <button type="submit" class="btn btn-primary btn-block btn-lg" id="submitBtn">Crear cuenta</button>
      </form>

      <div class="form-footer">
        ¿Ya tienes cuenta? <a href="login.html">Iniciar sesión</a>
      </div>
    </div>
  </div>

  <script type="module" src="js/pages/auth.js"></script>
</body>
</html>
